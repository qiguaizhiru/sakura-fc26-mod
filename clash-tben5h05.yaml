mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
unified-delay: true
find-process-mode: strict
global-client-fingerprint: chrome

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.direct"
    - localhost.ptlogin2.qq.com
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:
  - name: "自己用嘿嘿-tben5h05"
    type: vless
    server: yulei.trade
    port: 50159
    uuid: a06824d7-4b6d-40c0-8583-6f21a3f4159c
    network: tcp
    udp: true
    tls: true
    servername: www.nvidia.com
    client-fingerprint: chrome
    skip-cert-verify: false
    reality-opts:
      public-key: 1gApiTKop-JoNtRQL13top6vmvdVqZSsgV_tJLIgllM
      short-id: e5
      spider-x: /
    flow: xtls-rprx-vision

